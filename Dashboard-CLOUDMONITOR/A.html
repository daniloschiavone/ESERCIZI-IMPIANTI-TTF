<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enterprise Cloud Monitor</title>
  <link rel="stylesheet" href="./B.CSS">
</head>
<body>
  <main class="dashboard-grid">
    <header class="header card">
      <h1>🚀 Enterprise Cloud Monitor</h1>
      <div id="system-status" class="status-badge bg-ok">SYSTEM HEALTHY</div>
    </header>

    <section class="card controls">
      <h3>⚙️ Configurazione</h3>
      <div class="input-group">
        <label for="inp-users">Utenti Concorrenti</label>
        <input type="number" id="inp-users" min="0" value="500">
      </div>
      <div class="input-group">
        <label for="inp-reqs">Richieste per Utente (RPM)</label>
        <input type="number" id="inp-reqs" min="0" value="5">
      </div>
      <div class="input-group">
        <label for="inp-cap">Capacità Server (Max RPM)</label>
        <input type="number" id="inp-cap" min="1" value="5000">
      </div>
      <p class="hint">Modifica i valori per simulare scenari di carico.</p>
    </section>

    <section class="kpi-container">
      <div class="kpi-card">
        <small>Carico Totale (RPM)</small>
        <div class="kpi-value" id="kpi-load">0</div>
      </div>
      <div class="kpi-card">
        <small>Saturazione Server</small>
        <div class="kpi-value" id="kpi-sat">0%</div>
      </div>
      <div class="kpi-card">
        <small>Margine Disponibile</small>
        <div class="kpi-value" id="kpi-margin">0%</div>
      </div>
    </section>

    <section class="chart-wrapper" id="chart-trend-box">
      <h3>Trend Real-Time</h3>
      <canvas id="trendChart"></canvas>
    </section>

    <section class="chart-wrapper" id="chart-dist-box">
      <h3>Distribuzione Carico</h3>
      <canvas id="distChart"></canvas>
    </section>

    <section class="chart-wrapper" id="chart-proj-box">
      <h3>Proiezione 6 Mesi</h3>
      <canvas id="projChart"></canvas>
    </section>

    <section class="card recommendations">
      <h3>🤖 AI Advisor</h3>
      <p id="advisor-text">Inizializzazione sistema in corso...</p>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="./C.Js"></script>
</body>
</html>
